[goldmark]
  [goldmark.extensions]
    [goldmark.extensions.passthrough]
      enable = true

      [goldmark.extensions.passthrough.delimiters]
        block  = [["\\[", "\\]"], ["$$", "$$"]]
        inline = [["\\(", "\\)"]]

  [goldmark.renderer]
    unsafe = true

[tableOfContents]
  endLevel   = 3
  ordered    = false
  startLevel = 2

[highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  lineNoStart = 1
  lineNos = false
  lineNumbersInTable = true
  tabWidth = 2
