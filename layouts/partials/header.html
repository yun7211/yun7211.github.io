<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="{{ site.Title }}">
      <span class="brand-mark">Y</span>
      <span class="brand-text">{{ site.Title }}</span>
    </a>
    <nav class="main-nav" aria-label="主导航" data-i18n-attr="aria-label:nav.aria">
      {{ range site.Menus.main }}
        <a href="{{ .URL | relLangURL }}" data-i18n="nav.{{ .Identifier }}" {{ if $.IsMenuCurrent "main" . }}aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
    <div class="header-tools" aria-label="站点工具" data-i18n-attr="aria-label:tools.aria">
      <button class="search-open-button" type="button" data-search-open>
        <span aria-hidden="true">⌕</span>
        <span data-i18n="search.button">搜索</span>
      </button>
      <label class="tool-select-label">
        <span data-i18n="tools.language">语言</span>
        <select class="tool-select" data-lang-select aria-label="Language">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </label>
      <label class="tool-select-label">
        <span data-i18n="tools.theme">主题</span>
        <select class="tool-select" data-theme-select aria-label="Theme">
          <option value="light" data-i18n="theme.light">亮色</option>
          <option value="dark" data-i18n="theme.dark">暗色</option>
        </select>
      </label>
    </div>
  </div>
</header>

<div class="search-overlay" data-search-overlay hidden></div>
<section class="search-panel" data-search-panel data-search-index="{{ "index.json" | relURL }}" role="dialog" aria-modal="true" aria-labelledby="search-title" hidden>
  <div class="search-panel-header">
    <div>
      <p class="eyebrow">Search</p>
      <h2 id="search-title" data-i18n="search.title">站内搜索</h2>
    </div>
    <button class="search-close-button" type="button" data-search-close aria-label="Close search">×</button>
  </div>
  <label class="search-input-label">
    <span data-i18n="search.label">关键词</span>
    <input class="search-input" type="search" data-search-input data-i18n-attr="placeholder:search.placeholder" placeholder="搜索文章、栏目、标签">
  </label>
  <p class="search-status" data-search-status data-i18n="search.hint">输入关键词后显示匹配内容。</p>
  <div class="search-results" data-search-results></div>
</section>
