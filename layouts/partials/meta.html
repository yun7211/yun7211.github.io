<div class="article-meta">
  <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
  {{ with .Params.categories }}
    <span>{{ delimit . " / " }}</span>
  {{ end }}
  {{ with .ReadingTime }}
    <span><span data-i18n="meta.readingTimePrefix">约</span> {{ . }} <span data-i18n="meta.readingTimeSuffix">分钟</span></span>
  {{ end }}
  {{ if .IsPage }}
    <span><span data-i18n="meta.pageViews">本文阅读</span> <strong data-page-views>0</strong> <span data-i18n="meta.times">次</span></span>
    <span><span data-i18n="meta.totalViews">本站累计阅读</span> <strong data-total-views>0</strong> <span data-i18n="meta.times">次</span></span>
  {{ end }}
</div>
