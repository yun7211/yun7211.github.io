baseURL = "https://yun7211.github.io/"
locale = "zh-cn"
title = "Yun 的个人博客"
defaultContentLanguage = "zh-cn"
hasCJKLanguage = true
enableRobotsTXT = true
enableEmoji = true
summaryLength = 120
timeZone = "Asia/Shanghai"

[pagination]
pagerSize = 8

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
  noClasses = false
  lineNos = false
  tabWidth = 2
  [markup.goldmark.renderer]
  unsafe = true
  [markup.tableOfContents]
  startLevel = 2
  endLevel = 3
  ordered = false

[taxonomies]
category = "categories"
tag = "tags"
series = "series"

[permalinks]
posts = "/posts/:slug/"

[params]
description = "记录嵌入式 Linux、C 语言、AI、研究课题、技术实践和长期写作。"
author = "Yun"
mainSections = ["posts", "embedded-linux", "c-language", "ai", "research"]
license = "CC BY-NC-SA 4.0"
github = "https://github.com/yun7211"
rss = "/index.xml"
defaultCover = "/images/site-cover.svg"

